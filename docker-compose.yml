services:
  postgres:
    image: postgres:16-alpine
    container_name: buy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: buy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '55432:5432'
    volumes:
      - buy_postgres_data:/var/lib/postgresql/data

volumes:
  buy_postgres_data:
