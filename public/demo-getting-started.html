<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新手上手指南</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: #0f172a;
        background: #f8fafc;
      }

      body {
        margin: 0;
        padding: 40px 20px;
        background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 35%, #ffffff 100%);
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 32px;
        padding: 40px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 4vw, 48px);
      }

      h2 {
        margin-top: 36px;
        font-size: 24px;
      }

      p,
      li {
        font-size: 16px;
        line-height: 1.9;
        color: #475569;
      }

      .badge {
        display: inline-flex;
        padding: 8px 14px;
        border-radius: 999px;
        background: #eef2ff;
        color: #4338ca;
        font-size: 14px;
        font-weight: 600;
      }

      .panel {
        margin-top: 24px;
        padding: 20px 22px;
        border-radius: 24px;
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">新手上手指南</span>
      <h1>先用 3 分钟了解购买后怎么开始</h1>
      <p>
        这是一份演示用指南模板。真实业务里，你可以把领取方式、使用步骤、资料入口和售后说明统一整理在这里，帮助用户少走弯路。
      </p>

      <section class="panel">
        <h2>推荐阅读顺序</h2>
        <ol>
          <li>先看商品适合谁，确认是否和自己的需求匹配。</li>
          <li>再看使用步骤与资料入口，知道购买后去哪里开始。</li>
          <li>最后看常见问题和售后说明，减少来回咨询成本。</li>
        </ol>
      </section>

      <h2>建议你在正式内容里补充这些信息</h2>
      <ul>
        <li>购买后如何领取或开通</li>
        <li>第一次使用的操作步骤</li>
        <li>常见错误与处理方式</li>
        <li>售后联系渠道与回复时段</li>
      </ul>

      <p>如果你已经在后台维护了真实教程内容，这个演示页可以随时被替换或删除。</p>
    </main>
  </body>
</html>
